<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tanveer404</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#0f172a,#1e293b,#0f172a,#1e1b4b);
    background-size:400% 400%;
    animation:bg 12s ease infinite;
    overflow:hidden;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{
    width:90%;
    max-width:700px;
    padding:40px;
    border-radius:25px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.15);
    text-align:center;
    color:white;
    animation:fadeUp 1.2s ease;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(50px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h1{
    font-size:4rem;
    margin-bottom:10px;
}

.highlight{
    background:linear-gradient(90deg,#38bdf8,#818cf8);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

p{
    color:#cbd5e1;
    font-size:1.1rem;
    margin-bottom:25px;
}

.buttons{
    display:flex;
    gap:15px;
    justify-content:center;
    flex-wrap:wrap;
}

.btn{
    text-decoration:none;
    color:white;
    padding:12px 24px;
    border-radius:12px;
    background:rgba(255,255,255,0.1);
    transition:0.3s;
}

.btn:hover{
    transform:translateY(-4px);
    background:rgba(255,255,255,0.2);
}

.glow{
    position:absolute;
    width:300px;
    height:300px;
    background:#3b82f6;
    border-radius:50%;
    filter:blur(150px);
    opacity:.25;
    top:-100px;
    left:-100px;
}

.glow2{
    position:absolute;
    width:300px;
    height:300px;
    background:#8b5cf6;
    border-radius:50%;
    filter:blur(150px);
    opacity:.25;
    bottom:-100px;
    right:-100px;
}
</style>
</head>

<body>

<div class="glow"></div>
<div class="glow2"></div>

<div class="card">
    <h1>Hi, I'm <span class="highlight">Tanveer</span></h1>
    <p>
        Welcome to my website.
        Built with GitHub Pages, Cloudflare and a lot of patience 😎
    </p>

    <div class="buttons">
        <a href="#" class="btn">About Me</a>
        <a href="https://github.com/XxTanveerxX" class="btn">GitHub</a>
    </div>
</div>

</body>
</html>
