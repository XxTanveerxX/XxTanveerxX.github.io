<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Cinematic Engine</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui;
}

body {
  background: #05060a;
  color: white;
  overflow: hidden;
}

/* ===== WEBGL BACKGROUND ===== */
canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
}

/* ===== SCROLL SYSTEM ===== */
#wrap {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
}

#content {
  will-change: transform;
}

/* ===== CURSOR LIGHT FIELD ===== */
.cursor {
  position: fixed;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: white;
  mix-blend-mode: difference;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 999;
}

/* ===== SECTIONS ===== */
section {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 10vw;
  position: relative;
}

/* ===== TYPOGRAPHY ===== */
h1 {
  font-size: 6vw;
  letter-spacing: -0.04em;
}

.word {
  display: inline-block;
  transform: translateY(120%);
  opacity: 0;
  transition: 1.2s cubic-bezier(.2,.8,.2,1);
}

/* ===== MEDIA BLOCK ===== */
.media {
  width: 65%;
  height: 420px;
  margin-top: 40px;
  background: linear-gradient(120deg,#222,#444);
  position: relative;
  overflow: hidden;
  transform: scale(1.1);
  opacity: 0;
  transition: 1.2s cubic-bezier(.2,.8,.2,1);
}

.media::before {
  content: "";
  position: absolute;
  inset: 0;
  background: #05060a;
  transform: translateX(0%);
  transition: 1.2s cubic-bezier(.2,.8,.2,1);
}

/* ===== ACTIVE STATE ===== */
.show .word {
  transform: translateY(0);
  opacity: 1;
}

.show .media {
  transform: scale(1);
  opacity: 1;
}

.show .media::before {
  transform: translateX(100%);
}

/* ===== LAYER DEPTH SYSTEM ===== */
.layer {
  position: absolute;
  inset: 0;
  pointer-events: none;
}
</style>
</head>

<body>

<canvas id="gl"></canvas>
<div class="cursor" id="cursor"></div>

<div id="wrap">
<div id="content">

<section>
  <div>
    <h1 class="text">Cinematic Experience Engine</h1>
    <div class="media"></div>
  </div>
</section>

<section>
  <div>
    <h1 class="text">Everything becomes motion</h1>
    <div class="media"></div>
  </div>
</section>

<section>
  <div>
    <h1 class="text">Scroll is the timeline</h1>
    <div class="media"></div>
  </div>
</section>

<section>
  <div>
    <h1 class="text">Designed like a film</h1>
    <div class="media"></div>
  </div>
</section>

</div>
</div>

<script>

/* =========================
   1. INERTIA SCROLL ENGINE
========================= */

let current = 0;
let target = 0;

function lerp(a,b,n){ return a + (b-a)*n; }

const content = document.getElementById("content");

function scrollLoop(){
  target = window.scrollY;
  current = lerp(current, target, 0.07);

  content.style.transform = `translateY(${-current}px)`;

  requestAnimationFrame(scrollLoop);
}
scrollLoop();


/* =========================
   2. CURSOR PHYSICS FIELD
========================= */

const cursor = document.getElementById("cursor");

let cx = 0, cy = 0;
let tx = 0, ty = 0;

window.addEventListener("mousemove",(e)=>{
  tx = e.clientX;
  ty = e.clientY;
});

function cursorLoop(){
  cx = lerp(cx, tx, 0.14);
  cy = lerp(cy, ty, 0.14);

  cursor.style.left = cx + "px";
  cursor.style.top = cy + "px";

  requestAnimationFrame(cursorLoop);
}
cursorLoop();


/* =========================
   3. TEXT ENGINE (WORD SPLIT)
========================= */

document.querySelectorAll(".text").forEach(el=>{
  const words = el.innerText.split(" ");
  el.innerHTML = "";

  words.forEach((w,i)=>{
    const span = document.createElement("span");
    span.className = "word";
    span.innerText = w + " ";
    span.style.transitionDelay = (i * 0.05) + "s";
    el.appendChild(span);
  });
});


/* =========================
   4. SCROLL REVEAL ENGINE
========================= */

const sections = document.querySelectorAll("section");

function reveal(){
  const trigger = window.innerHeight * 0.75;

  sections.forEach(sec=>{
    const rect = sec.getBoundingClientRect();

    if(rect.top < trigger){
      sec.classList.add("show");
    }
  });

  requestAnimationFrame(reveal);
}
reveal();


/* =========================
   5. WEBGL-STYLE BACKGROUND (FAKE SHADER FIELD)
========================= */

const canvas = document.getElementById("gl");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let t = 0;

function render(){
  ctx.fillStyle = "rgba(5,6,10,0.15)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  for(let i=0;i<120;i++){
    let x = canvas.width/2 + Math.sin(t + i * 0.1) * 300;
    let y = canvas.height/2 + Math.cos(t + i * 0.12) * 300;

    ctx.beginPath();
    ctx.arc(x,y,1.2,0,Math.PI*2);
    ctx.fillStyle = "rgba(255,255,255,0.12)";
    ctx.fill();
  }

  t += 0.008;
  requestAnimationFrame(render);
}
render();


/* =========================
   6. RESIZE HANDLER
========================= */

window.addEventListener("resize",()=>{
  canvas.width = innerWidth;
  canvas.height = innerHeight;
});

</script>

</body>
</html>
